<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>움직이는 그라데이션 배경</title>
    <style>
        /* 기본 여백을 제거하고 화면에 꽉 차도록 설정합니다. */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* 기본 배경색 (흰색) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* 가장 아래 배경 */
        }

        /* --- 사용자 이미지 레이어 --- */
        #custom-image-container {
            position: absolute;
            z-index: 5;
            display: none; /* 기본은 숨김 */
            cursor: grab;
            /* 초기 중앙 배치 (이후 JS로 덮어씌워짐) */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #custom-image-container:active {
            cursor: grabbing;
        }

        #custom-image-container img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none; /* 이미지 자체가 드래그 되는 기본 동작 방지 */
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
        }

        /* --- 컨트롤 패널 스타일 (기존 유지) --- */
        .toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.85);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 1);
        }

        #controls {
            position: absolute;
            top: 70px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            color: #333;
            padding: 20px;
            border-radius: 12px;
            font-family: sans-serif;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 280px;
            max-height: calc(100vh - 100px); 
            overflow-y: auto;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
        }

        #controls::-webkit-scrollbar { width: 6px; }
        #controls::-webkit-scrollbar-track { background: transparent; }
        #controls::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 3px; }
        #controls.hidden { opacity: 0; transform: translateY(-10px); visibility: hidden; pointer-events: none; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        .control-group select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .colors-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        input[type="color"] { border: none; width: 30px; height: 30px; border-radius: 15px; cursor: pointer; padding: 0; overflow: hidden; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 15px; }
        .action-btn { padding: 8px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; width: 100%; transition: background 0.2s; }
        .action-btn:hover { background: #f0f0f0; }
        .icon-btn { padding: 2px 8px; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .icon-btn:hover { background: #eee; }
    </style>
</head>
<body>

<!-- 1. 배경용 캔버스 (z-index: 1) -->
<canvas id="bg-canvas"></canvas>

<!-- 2. 사용자 업로드 이미지 컨테이너 (드래그 가능) (z-index: 5) -->
<div id="custom-image-container">
    <img id="custom-img" alt="사용자 업로드 이미지">
</div>

<!-- 3. 컨트롤 패널 (z-index: 10, 20) -->
<button id="toggle-btn" class="toggle-btn">⚙️ 설정 숨기기</button>

<div id="controls">
    <div class="control-group" style="flex-direction: row; gap: 8px; margin-bottom: 5px;">
        <button id="btn-save-local" class="action-btn" style="background: #2d4ae3; color: white; border-color: #2d4ae3; font-weight: bold;">💾 설정 브라우저에 저장</button>
        <button id="btn-reset-local" class="action-btn" style="flex: 0.4;">초기화</button>
    </div>
    
    <!-- 💡 신규 기능: 이미지 업로드 및 배치 설정 -->
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 5px 0;">
    <div class="control-group" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(44, 209, 252, 0.1); padding: 10px; border-radius: 8px;">
        <label style="margin:0; cursor:pointer; color: #007bb5;" for="inp-showImage">🖼 이미지 모드 켜기</label>
        <input type="checkbox" id="inp-showImage" style="width: 20px; height: 20px; cursor: pointer;">
    </div>
    
    <div class="control-group" id="image-settings" style="display: none; background: rgba(0,0,0,0.03); padding: 10px; border-radius: 8px; margin-bottom: 5px;">
        <label>PNG / 이미지 업로드</label>
        <input type="file" id="inp-upload-img" accept="image/png, image/jpeg, image/webp, image/gif" style="font-size: 12px; margin: 5px 0;">
        <p style="font-size: 11px; color: #666; margin-bottom: 8px;">💡 이미지를 캔버스 위에서 직접 드래그하여 위치를 옮길 수 있습니다.</p>
        <label>이미지 너비 조절 <span id="val-img-width">600px</span></label>
        <input type="range" id="inp-img-width" min="100" max="2000" value="600">
    </div>
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 5px 0;">

    <div class="control-group" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px;">
        <label style="margin:0; cursor:pointer;" for="inp-editMode">🛠 파티클 편집 모드 (드래그)</label>
        <input type="checkbox" id="inp-editMode" style="width: 20px; height: 20px; cursor: pointer;">
    </div>

    <!-- 개별 파티클 조절 패널 (편집 모드 시 표시) -->
    <div class="control-group" id="selected-panel" style="display: none; background: rgba(45, 74, 227, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 5px; border: 1px solid rgba(45, 74, 227, 0.2);">
        <label style="color: #2d4ae3; margin-bottom: 5px;">🎯 선택된 파티클</label>
        <div class="control-group">
            <label>크기 (마우스 휠) <span id="val-sel-radius">-</span></label>
            <input type="range" id="inp-sel-radius" min="50" max="2500" value="400">
        </div>
        <div class="control-group" style="margin-top: 5px; flex-direction: row; align-items: center; justify-content: space-between;">
            <label style="margin:0;">개별 색상</label>
            <input type="color" id="inp-sel-color">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
            <button id="btn-forward-one" class="action-btn">🔼 한 칸 앞으로</button>
            <button id="btn-bring-front" class="action-btn">⏫ 맨 앞으로</button>
            <button id="btn-backward-one" class="action-btn">🔽 한 칸 뒤로</button>
            <button id="btn-send-back" class="action-btn">⏬ 맨 뒤로</button>
        </div>
    </div>

    <div class="control-group">
        <label>파티클 개수 <span id="val-particles">15</span></label>
        <input type="range" id="inp-particles" min="1" max="50" value="15">
    </div>
    <div class="control-group">
        <label>이동 속도 <span id="val-speed">1.0</span></label>
        <input type="range" id="inp-speed" min="0" max="5.0" step="0.1" value="1.0">
    </div>
    <div class="control-group">
        <label>최소 크기 <span id="val-minRadius">400</span></label>
        <input type="range" id="inp-minRadius" min="100" max="800" value="400">
    </div>
    <div class="control-group">
        <label>최대 크기 <span id="val-maxRadius">900</span></label>
        <input type="range" id="inp-maxRadius" min="500" max="1500" value="900">
    </div>
    <div class="control-group">
        <label>합성 모드 (Blend Mode)</label>
        <select id="inp-blend">
            <option value="saturation">Saturation (색상 강조)</option>
            <option value="screen">Screen (밝게)</option>
            <option value="multiply">Multiply (어둡게)</option>
            <option value="overlay">Overlay (대비 증가)</option>
            <option value="source-over">Normal (기본)</option>
        </select>
    </div>
    <div class="control-group">
        <label>해상도 배율 <span id="val-resolution"></span></label>
        <input type="range" id="inp-resolution" min="1" max="4" step="0.5" value="2">
    </div>
    <div class="control-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="margin: 0;">전체 색상 팔레트</label>
            <div>
                <button id="btn-add-color" class="icon-btn" title="색상 추가">+</button>
                <button id="btn-remove-color" class="icon-btn" title="마지막 색상 삭제">-</button>
            </div>
        </div>
        <div class="colors-container" id="colors-container"></div>
    </div>
</div>

<script>
    const defaultConfig = {
        particles: 15,
        speed: 1.0,
        minRadius: 400,
        maxRadius: 900,
        resolution: window.devicePixelRatio ? Math.max(2, window.devicePixelRatio) : 2,
        blendMode: 'saturation',
        colors: ['#2d4ae3', '#faff59', '#ff68f8', '#2cd1fc', '#36e954'],
        isEditMode: false,
        showImage: false, // 이미지 모드 켜기/끄기
        imgSrc: '',       // 업로드한 이미지 Data URL
        imgWidth: 600,    // 이미지 너비
        imgX: 0,          // 이미지 X 좌표 (중앙 기준 오프셋)
        imgY: 0           // 이미지 Y 좌표 (중앙 기준 오프셋)
    };

    let config = JSON.parse(JSON.stringify(defaultConfig));

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r: 0, g: 0, b: 0};
    }

    function rgbToHex(r, g, b) {
        return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
    }

    const PI2 = Math.PI * 2;

    class GlowParticle {
        constructor(x, y, radius, rgb, vx = null, vy = null) {
            this.x = x; this.y = y; this.radius = radius; this.rgb = rgb;
            this.vx = vx !== null ? vx : (Math.random() * 4 * (Math.random() > 0.5 ? 1 : -1));
            this.vy = vy !== null ? vy : (Math.random() * 4 * (Math.random() > 0.5 ? 1 : -1));
        }

        animate(ctx, stageWidth, stageHeight, isSelected = false) {
            if (!config.isEditMode) {
                this.x += this.vx * config.speed; this.y += this.vy * config.speed;
                if (this.x < 0) { this.vx *= -1; this.x = 0; } else if (this.x > stageWidth) { this.vx *= -1; this.x = stageWidth; }
                if (this.y < 0) { this.vy *= -1; this.y = 0; } else if (this.y > stageHeight) { this.vy *= -1; this.y = stageHeight; }
            }

            ctx.beginPath();
            const g = ctx.createRadialGradient(this.x, this.y, this.radius * 0.01, this.x, this.y, this.radius);
            g.addColorStop(0, `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, 1)`);
            g.addColorStop(1, `rgba(${this.rgb.r}, ${this.rgb.g}, ${this.rgb.b}, 0)`);
            
            ctx.fillStyle = g; ctx.arc(this.x, this.y, this.radius, 0, PI2, false); ctx.fill();

            if (config.isEditMode) {
                ctx.beginPath();
                if (isSelected) {
                    ctx.strokeStyle = `rgba(255, 255, 255, 1)`; ctx.lineWidth = 4; ctx.arc(this.x, this.y, this.radius * 0.1, 0, PI2, false); ctx.stroke();
                    ctx.beginPath(); ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`; ctx.lineWidth = 1; ctx.setLineDash([5, 5]); ctx.arc(this.x, this.y, this.radius, 0, PI2, false); ctx.stroke(); ctx.setLineDash([]);
                } else {
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`; ctx.lineWidth = 2; ctx.arc(this.x, this.y, this.radius * 0.1, 0, PI2, false); ctx.stroke();
                }
            }
        }
    }

    class App {
        constructor() {
            this.canvas = document.getElementById('bg-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.draggingParticle = null; this.selectedParticle = null; this.isPointerDown = false;

            this.canvas.addEventListener('mousedown', this.onDown.bind(this));
            this.canvas.addEventListener('mousemove', this.onMove.bind(this));
            this.canvas.addEventListener('mouseup', this.onUp.bind(this));
            this.canvas.addEventListener('mouseleave', this.onUp.bind(this));
            this.canvas.addEventListener('wheel', this.onWheel.bind(this), {passive: false});
            this.canvas.addEventListener('touchstart', this.onDown.bind(this), {passive: false});
            this.canvas.addEventListener('touchmove', this.onMove.bind(this), {passive: false});
            this.canvas.addEventListener('touchend', this.onUp.bind(this));

            this.particles = [];
            window.addEventListener('resize', this.resize.bind(this), false);
            
            this.loadFromLocal();
            this.resize();
            window.requestAnimationFrame(this.animate.bind(this));
        }

        loadFromLocal() {
            const savedData = localStorage.getItem('gradientBackgroundData');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    config = { ...config, ...parsed.config };
                    if (parsed.particlesData && parsed.particlesData.length > 0) {
                        this.particles = parsed.particlesData.map(p => new GlowParticle(p.x, p.y, p.radius, p.rgb, p.vx, p.vy));
                        this.hasLoadedParticles = true;
                    }
                } catch(e) { console.error("데이터 로드 실패", e); }
            }
        }

        resize() {
            this.stageWidth = document.body.clientWidth; this.stageHeight = document.body.clientHeight;
            this.pixelRatio = config.resolution;
            this.canvas.width = this.stageWidth * this.pixelRatio; this.canvas.height = this.stageHeight * this.pixelRatio;
            this.ctx.scale(this.pixelRatio, this.pixelRatio);
            if (!this.hasLoadedParticles) this.createParticles();
            else this.hasLoadedParticles = false;
        }

        getPointerPos(e) {
            let clientX = e.clientX; let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: clientX, y: clientY };
        }

        onDown(e) {
            if (!config.isEditMode) return;
            if (e.target.closest('#controls') || e.target.closest('#toggle-btn') || e.target.closest('#custom-image-container')) return;
            
            this.isPointerDown = true;
            const pos = this.getPointerPos(e);
            let closestParticle = null; let minDistance = Infinity;

            for (let i = 0; i < this.particles.length; i++) {
                const p = this.particles[i]; const dx = pos.x - p.x; const dy = pos.y - p.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < p.radius && distance < minDistance) { closestParticle = p; minDistance = distance; }
            }

            if (closestParticle) {
                this.draggingParticle = closestParticle; this.selectedParticle = closestParticle;
                this.canvas.style.cursor = 'grabbing';
            } else { this.selectedParticle = null; }
            if(this.onSelectedChange) this.onSelectedChange(this.selectedParticle);
        }

        onWheel(e) {
            if (!config.isEditMode || !this.selectedParticle) return;
            if (e.target.closest('#controls') || e.target.closest('#custom-image-container')) return;
            e.preventDefault();
            const delta = e.deltaY > 0 ? -30 : 30;
            this.selectedParticle.radius = Math.max(50, Math.min(2500, this.selectedParticle.radius + delta));
            if(this.onSelectedChange) this.onSelectedChange(this.selectedParticle);
        }

        onMove(e) {
            if (!config.isEditMode) { this.canvas.style.cursor = 'default'; return; }
            if (!this.draggingParticle) {
                const pos = this.getPointerPos(e); let isHover = false;
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i]; const dx = pos.x - p.x; const dy = pos.y - p.y;
                    if (Math.sqrt(dx * dx + dy * dy) < p.radius) { isHover = true; break; }
                }
                this.canvas.style.cursor = isHover ? 'grab' : 'crosshair';
            }
            if (this.draggingParticle && this.isPointerDown) {
                e.preventDefault(); const pos = this.getPointerPos(e);
                this.draggingParticle.x = pos.x; this.draggingParticle.y = pos.y;
            }
        }

        onUp(e) {
            this.isPointerDown = false; this.draggingParticle = null;
            this.canvas.style.cursor = config.isEditMode ? 'crosshair' : 'default';
        }

        createParticles() {
            let curColor = 0; this.particles = [];
            for (let i = 0; i < config.particles; i++) {
                this.particles[i] = new GlowParticle(
                    Math.random() * this.stageWidth, Math.random() * this.stageHeight,
                    Math.random() * (config.maxRadius - config.minRadius) + config.minRadius,
                    hexToRgb(config.colors[curColor])
                );
                if (++curColor >= config.colors.length) curColor = 0;
            }
        }

        animate() {
            window.requestAnimationFrame(this.animate.bind(this));
            this.ctx.clearRect(0, 0, this.stageWidth, this.stageHeight);
            this.ctx.globalCompositeOperation = config.blendMode;
            for (let i = 0; i < config.particles; i++) {
                if(this.particles[i]) this.particles[i].animate(this.ctx, this.stageWidth, this.stageHeight, this.particles[i] === this.selectedParticle);
            }
        }
    }

    function initControls(app) {
        // --- 로컬 스토리지 연동 ---
        document.getElementById('btn-save-local').addEventListener('click', () => {
            const saveData = {
                config: config,
                particlesData: app.particles.map(p => ({ x: p.x, y: p.y, radius: p.radius, rgb: p.rgb, vx: p.vx, vy: p.vy }))
            };
            localStorage.setItem('gradientBackgroundData', JSON.stringify(saveData));
            const btn = document.getElementById('btn-save-local');
            const originalText = btn.textContent;
            btn.textContent = "✅ 저장 완료!";
            setTimeout(() => btn.textContent = originalText, 1500);
        });

        document.getElementById('btn-reset-local').addEventListener('click', () => {
            if(confirm("저장된 데이터를 지우고 처음 상태로 돌아가시겠습니까?")) {
                localStorage.removeItem('gradientBackgroundData');
                location.reload();
            }
        });

        // --- 이미지 업로드 & 드래그 이벤트 ---
        const imageContainer = document.getElementById('custom-image-container');
        const customImg = document.getElementById('custom-img');
        const imageSettings = document.getElementById('image-settings');
        const inpShowImage = document.getElementById('inp-showImage');
        const inpImgWidth = document.getElementById('inp-img-width');
        const valImgWidth = document.getElementById('val-img-width');

        // 이미지 드래그 변수
        let isDraggingImage = false;
        let imgStartX = 0, imgStartY = 0;
        let initialMouseX = 0, initialMouseY = 0;

        function updateImageUI() {
            if (config.showImage) {
                imageSettings.style.display = 'flex';
                imageSettings.style.flexDirection = 'column';
                if (config.imgSrc) {
                    customImg.src = config.imgSrc;
                    imageContainer.style.display = 'block';
                }
                imageContainer.style.width = config.imgWidth + 'px';
                // 저장된 위치 반영 (중앙 기준 50% + 저장된 offset)
                imageContainer.style.transform = `translate(calc(-50% + ${config.imgX}px), calc(-50% + ${config.imgY}px))`;
            } else {
                imageContainer.style.display = 'none';
                imageSettings.style.display = 'none';
            }
            inpShowImage.checked = config.showImage;
            inpImgWidth.value = config.imgWidth;
            valImgWidth.textContent = config.imgWidth + 'px';
        }

        inpShowImage.addEventListener('change', (e) => {
            config.showImage = e.target.checked;
            updateImageUI();
        });

        document.getElementById('inp-upload-img').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    config.imgSrc = event.target.result;
                    updateImageUI();
                }
                reader.readAsDataURL(file);
            }
        });

        inpImgWidth.addEventListener('input', (e) => {
            config.imgWidth = parseInt(e.target.value);
            valImgWidth.textContent = config.imgWidth + 'px';
            imageContainer.style.width = config.imgWidth + 'px';
        });

        // 이미지 드래그 로직 (마우스 & 터치)
        function startImageDrag(e) {
            isDraggingImage = true;
            initialMouseX = e.clientX || e.touches[0].clientX;
            initialMouseY = e.clientY || e.touches[0].clientY;
            imgStartX = config.imgX;
            imgStartY = config.imgY;
            e.preventDefault(); // 기본 드래그 동작 방지
        }

        function doImageDrag(e) {
            if (!isDraggingImage) return;
            const currentMouseX = e.clientX || e.touches[0].clientX;
            const currentMouseY = e.clientY || e.touches[0].clientY;
            
            // 이동 거리 계산
            const dx = currentMouseX - initialMouseX;
            const dy = currentMouseY - initialMouseY;

            // 새 위치 적용
            config.imgX = imgStartX + dx;
            config.imgY = imgStartY + dy;
            
            imageContainer.style.transform = `translate(calc(-50% + ${config.imgX}px), calc(-50% + ${config.imgY}px))`;
        }

        function endImageDrag() {
            isDraggingImage = false;
        }

        imageContainer.addEventListener('mousedown', startImageDrag);
        window.addEventListener('mousemove', doImageDrag);
        window.addEventListener('mouseup', endImageDrag);

        imageContainer.addEventListener('touchstart', startImageDrag, {passive: false});
        window.addEventListener('touchmove', doImageDrag, {passive: false});
        window.addEventListener('touchend', endImageDrag);

        // UI 초기값 세팅
        document.getElementById('inp-particles').value = config.particles; document.getElementById('val-particles').textContent = config.particles;
        document.getElementById('inp-speed').value = config.speed; document.getElementById('val-speed').textContent = config.speed;
        document.getElementById('inp-minRadius').value = config.minRadius; document.getElementById('val-minRadius').textContent = config.minRadius;
        document.getElementById('inp-maxRadius').value = config.maxRadius; document.getElementById('val-maxRadius').textContent = config.maxRadius;
        document.getElementById('inp-resolution').value = config.resolution; document.getElementById('val-resolution').textContent = config.resolution;
        document.getElementById('inp-blend').value = config.blendMode;
        document.getElementById('inp-editMode').checked = config.isEditMode;
        
        // 이미지 로드 및 초기 배치
        updateImageUI();

        // --- 기타 컨트롤 연동 ---
        const toggleBtn = document.getElementById('toggle-btn');
        const controlsPanel = document.getElementById('controls');
        
        toggleBtn.addEventListener('click', () => {
            controlsPanel.classList.toggle('hidden');
            toggleBtn.textContent = controlsPanel.classList.contains('hidden') ? '⚙️ 설정 열기' : '⚙️ 설정 숨기기';
        });

        document.getElementById('inp-particles').addEventListener('input', (e) => { config.particles = parseInt(e.target.value); document.getElementById('val-particles').textContent = config.particles; app.createParticles(); });
        document.getElementById('inp-speed').addEventListener('input', (e) => { config.speed = parseFloat(e.target.value); document.getElementById('val-speed').textContent = config.speed.toFixed(1); });
        
        document.getElementById('inp-minRadius').addEventListener('input', (e) => {
            config.minRadius = parseInt(e.target.value); document.getElementById('val-minRadius').textContent = config.minRadius;
            if(config.minRadius > config.maxRadius) { config.maxRadius = config.minRadius; document.getElementById('inp-maxRadius').value = config.maxRadius; document.getElementById('val-maxRadius').textContent = config.maxRadius; }
            app.createParticles();
        });

        document.getElementById('inp-maxRadius').addEventListener('input', (e) => {
            config.maxRadius = parseInt(e.target.value); document.getElementById('val-maxRadius').textContent = config.maxRadius;
            if(config.maxRadius < config.minRadius) { config.minRadius = config.maxRadius; document.getElementById('inp-minRadius').value = config.minRadius; document.getElementById('val-minRadius').textContent = config.minRadius; }
            app.createParticles();
        });

        document.getElementById('inp-resolution').addEventListener('input', (e) => { config.resolution = parseFloat(e.target.value); document.getElementById('val-resolution').textContent = config.resolution.toFixed(1); app.resize(); });

        const selPanel = document.getElementById('selected-panel');
        const inpSelRadius = document.getElementById('inp-sel-radius');
        const valSelRadius = document.getElementById('val-sel-radius');
        const inpSelColor = document.getElementById('inp-sel-color');

        app.onSelectedChange = (particle) => {
            if (particle) {
                selPanel.style.display = 'flex'; selPanel.style.flexDirection = 'column';
                inpSelRadius.value = particle.radius; valSelRadius.textContent = Math.round(particle.radius);
                inpSelColor.value = rgbToHex(particle.rgb.r, particle.rgb.g, particle.rgb.b);
            } else { selPanel.style.display = 'none'; }
        };

        inpSelRadius.addEventListener('input', (e) => { if (app.selectedParticle) { app.selectedParticle.radius = parseFloat(e.target.value); valSelRadius.textContent = Math.round(app.selectedParticle.radius); } });
        inpSelColor.addEventListener('input', (e) => { if (app.selectedParticle) { app.selectedParticle.rgb = hexToRgb(e.target.value); } });

        document.getElementById('btn-bring-front').addEventListener('click', () => { if (app.selectedParticle) { const idx = app.particles.indexOf(app.selectedParticle); if (idx > -1 && idx < app.particles.length - 1) { app.particles.splice(idx, 1); app.particles.push(app.selectedParticle); } } });
        document.getElementById('btn-send-back').addEventListener('click', () => { if (app.selectedParticle) { const idx = app.particles.indexOf(app.selectedParticle); if (idx > 0) { app.particles.splice(idx, 1); app.particles.unshift(app.selectedParticle); } } });
        document.getElementById('btn-forward-one').addEventListener('click', () => { if (app.selectedParticle) { const idx = app.particles.indexOf(app.selectedParticle); if (idx > -1 && idx < app.particles.length - 1) { const temp = app.particles[idx + 1]; app.particles[idx + 1] = app.particles[idx]; app.particles[idx] = temp; } } });
        document.getElementById('btn-backward-one').addEventListener('click', () => { if (app.selectedParticle) { const idx = app.particles.indexOf(app.selectedParticle); if (idx > 0) { const temp = app.particles[idx - 1]; app.particles[idx - 1] = app.particles[idx]; app.particles[idx] = temp; } } });

        document.getElementById('inp-editMode').addEventListener('change', (e) => {
            config.isEditMode = e.target.checked;
            app.canvas.style.cursor = config.isEditMode ? 'crosshair' : 'default';
            if (!config.isEditMode) { app.selectedParticle = null; if(app.onSelectedChange) app.onSelectedChange(null); }
        });

        document.getElementById('inp-blend').addEventListener('change', (e) => { config.blendMode = e.target.value; });

        const colorsContainer = document.getElementById('colors-container');
        function renderColorPalette() {
            colorsContainer.innerHTML = ''; 
            config.colors.forEach((color, index) => {
                const input = document.createElement('input');
                input.type = 'color'; input.value = color;
                input.addEventListener('input', (e) => { config.colors[index] = e.target.value; app.createParticles(); });
                colorsContainer.appendChild(input);
            });
        }

        renderColorPalette();
        document.getElementById('btn-add-color').addEventListener('click', () => { config.colors.push('#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')); renderColorPalette(); app.createParticles(); });
        document.getElementById('btn-remove-color').addEventListener('click', () => { if (config.colors.length > 1) { config.colors.pop(); renderColorPalette(); app.createParticles(); } else { alert('최소 1개의 색상은 필요합니다.'); } });
    }

    window.onload = () => { const app = new App(); initControls(app); }
</script>

</body>
</html>
